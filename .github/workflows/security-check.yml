name: Security & Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # TruffleHogが全履歴をスキャンするために必要

      # 1. Secret Scanning (TruffleHog)
      # 環境変数やAPIキーがコードにハードコードされていないかを強力にチェックします
      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # 2. Node.js のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      # 3. 依存関係のインストール
      - name: Install Dependencies
        run: npm ci

      # 4. Dependency Audit
      # パッケージの既知の脆弱性（CVE）をチェックします。重大度が高(high)以上のものがあれば失敗させます
      - name: Run NPM Audit
        run: npm audit --audit-level=high

      # 5. Lint チェック (ESLint)
      - name: Run Linter
        run: npm run lint
        continue-on-error: true # Lintエラーでパイプラインを止めない場合は true にします

      # 6. Build テスト
      # 構文エラーやインポートエラーなどがないか、実際にビルドして検証します
      - name: Build Project
        run: npm run build
