server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ログ設定
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # サーバーのバージョン情報を隠蔽
    server_tokens off;

    # ==========================================
    # セキュリティヘッダーの強化
    # ==========================================
    # クリックジャッキング対策
    add_header X-Frame-Options "DENY" always;
    
    # XSSフィルタの有効化（旧ブラウザ向け）
    add_header X-XSS-Protection "1; mode=block" always;
    
    # MIMEスニッフィング対策
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrerポリシー
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP)
    # 外部リソースはSupabase等のみ許可し、他は厳しく制限
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; object-src 'none'; media-src 'self';" always;

    # ==========================================
    # SPAルーティング対応
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静的ファイルのキャッシュ設定
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # .ファイルのアクセス拒否
    location ~ /\. {
        deny all;
    }
}
